<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Футбольная статистика (все данные из CSV)</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #fff; margin: 1rem; }
        h1 { border-bottom: 2px solid #000; }
        .table-wrapper { overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 0.75rem; }
        th, td { border: 1px solid #888; padding: 5px; text-align: left; vertical-align: top; }
        th { background: #f0f0f0; position: sticky; top: 0; }
        .footer { margin-top: 1rem; font-size: 0.7rem; border-top: 1px dashed #aaa; padding-top: 0.5rem; }
    </style>
</head>
<body>
<h1>📊 ФУТБОЛЬНАЯ СТАТИСТИКА (все данные)</h1>
<p>Автоматическая загрузка из <strong>data.csv</strong> — обновите CSV, и сайт покажет новые данные.</p>
<div class="table-wrapper">
    <table id="stats-table">
        <thead id="table-header"></thead>
        <tbody id="table-body"><tr><td>Загрузка данных...</td></tr></tbody>
    </table>
</div>
<div class="footer">
    ✅ Сайт читает CSV при каждом открытии. Чтобы обновить статистику, замените файл <strong>data.csv</strong> на сервере.
</div>

<script>
    function parseCSV(csvText) {
        const rows = [];
        let currentRow = [], currentField = '', inQuotes = false;
        for (let i = 0; i < csvText.length; i++) {
            const ch = csvText[i], next = csvText[i+1];
            if (inQuotes) {
                if (ch === '"') {
                    if (next === '"') { currentField += '"'; i++; }
                    else inQuotes = false;
                } else currentField += ch;
            } else {
                if (ch === '"') inQuotes = true;
                else if (ch === ';') { currentRow.push(currentField); currentField = ''; }
                else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                    if (ch === '\r') i++;
                    currentRow.push(currentField);
                    rows.push(currentRow);
                    currentRow = [];
                    currentField = '';
                } else if (ch !== '\r') currentField += ch;
            }
        }
        if (currentField !== '' || currentRow.length) { currentRow.push(currentField); rows.push(currentRow); }
        return rows;
    }

    fetch('data.csv')
        .then(res => { if (!res.ok) throw new Error(`CSV не найден (${res.status})`); return res.text(); })
        .then(text => {
            const data = parseCSV(text);
            if (data.length === 0) throw new Error('CSV пуст');
            const headers = data[0];
            const rows = data.slice(1).filter(r => r.some(c => c.trim() !== ''));
            const thead = document.getElementById('table-header');
            const tbody = document.getElementById('table-body');
            thead.innerHTML = '';
            tbody.innerHTML = '';
            const trHead = document.createElement('tr');
            headers.forEach(h => { const th = document.createElement('th'); th.textContent = h.trim(); trHead.appendChild(th); });
            thead.appendChild(trHead);
            rows.forEach(row => {
                const tr = document.createElement('tr');
                for (let i = 0; i < headers.length; i++) {
                    const td = document.createElement('td');
                    td.textContent = (i < row.length) ? row[i].trim() : '';
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        })
        .catch(err => {
            document.getElementById('table-body').innerHTML = `<tr><td colspan="30" style="color:red;">Ошибка: ${err.message}. Убедитесь, что файл "data.csv" лежит рядом с этой страницей.</td></tr>`;
        });
</script>
</body>
</html>
